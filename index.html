<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live BPM & Key Monitor</title>
<style>
  :root { --accent: #00ff88; --bg: #050505; }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    text-align: center; margin: 0; padding: 20px; overflow-x: hidden;
  }
  h1 { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; font-size: 1.2rem; }

  .main-row {
    display: flex; flex-wrap: wrap; justify-content: center;
    align-items: center; gap: 40px; margin: 10px 0 20px;
  }
  #bpm-wrap, #key-wrap { position: relative; display: inline-block; }

  #bpm-display {
    font-size: 8rem; font-weight: 900; color: var(--accent); line-height: 1;
    text-shadow: 0 0 30px var(--accent);
    transition: transform 0.08s ease-out, text-shadow 0.1s;
  }
  #key-display {
    font-size: 6rem; font-weight: 900; color: #ff9500; line-height: 1;
    text-shadow: 0 0 30px #ff9500;
  }
  .big-label { font-size: 1rem; letter-spacing: 3px; opacity: 0.5; margin-top: -5px; }
  #camelot { font-size: 1.4rem; color: #ff9500; opacity: 0.8; margin-top: 6px; font-weight: 700; }

  #pulse-ring {
    position: absolute; top: 50%; left: 50%;
    width: 240px; height: 240px; margin: -120px 0 0 -120px;
    border-radius: 50%; border: 3px solid var(--accent); opacity: 0; pointer-events: none;
  }
  .ring-pulse { animation: ringExpand 0.3s ease-out; }
  @keyframes ringExpand {
    0% { transform: scale(0.7); opacity: 0.8; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  #canvasBox { position: relative; max-width: 900px; margin: 0 auto; }
  canvas { width: 100%; display: block; background: #0a0a0a; border-radius: 12px; margin-bottom: 15px; }

  .stats { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 900px; margin: 0 auto 20px; }
  .stat { background: #111; border: 1px solid #222; border-radius: 10px; padding: 12px 18px; min-width: 120px; }
  .stat .val { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

  .btn {
    padding: 18px 42px; font-size: 18px; border-radius: 50px; border: none;
    background: var(--accent); color: #000; font-weight: 700; cursor: pointer;
    letter-spacing: 1px; transition: transform 0.1s, box-shadow 0.2s;
  }
  .btn:hover { box-shadow: 0 0 25px var(--accent); transform: translateY(-2px); }

  #status { font-size: 0.85rem; opacity: 0.6; margin-top: 12px; height: 18px; }
  .beat-flash { position: fixed; inset: 0; background: radial-gradient(circle, rgba(0,255,136,0.15), transparent 70%); pointer-events: none; opacity: 0; z-index: -1; }

  /* Chroma bars */
  #chroma { display: flex; justify-content: center; gap: 4px; max-width: 500px; margin: 0 auto 20px; height: 60px; align-items: flex-end; }
  .chroma-bar { flex: 1; background: #ff9500; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.1s; position: relative; }
  .chroma-bar span { position: absolute; bottom: -18px; left: 0; right: 0; font-size: 0.65rem; opacity: 0.6; }
</style>
</head>
<body>
  <div class="beat-flash" id="flash"></div>
  <h1>Vinyl BPM &amp; Key Monitor</h1>

  <div class="main-row">
    <div id="bpm-wrap">
      <div id="pulse-ring"></div>
      <div id="bpm-display">--</div>
      <div class="big-label">BPM</div>
    </div>
    <div id="key-wrap">
      <div id="key-display">--</div>
      <div class="big-label">KEY</div>
      <div id="camelot">--</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="val" id="s-conf">0%</div><div class="lbl">BPM Conf</div></div>
    <div class="stat"><div class="val" id="s-inst">--</div><div class="lbl">Instant BPM</div></div>
    <div class="stat"><div class="val" id="s-keyconf">0%</div><div class="lbl">Key Conf</div></div>
    <div class="stat"><div class="val" id="s-vol">0</div><div class="lbl">Volume</div></div>
    <div class="stat"><div class="val" id="s-beats">0</div><div class="lbl">Beats</div></div>
  </div>

  <div id="chroma"></div>

  <div id="canvasBox"><canvas id="visualizer" width="900" height="180"></canvas></div>

  <button id="start-btn" class="btn">▶ Start Monitoring</button>
  <button id="reset-btn" class="btn" style="display:none;background:#333;color:#fff;">Reset</button>
  <div id="status">Click start and select your audio input.</div>

<script>
(() => {
  // ---------- DOM ----------
  const btn = document.getElementById('start-btn');
  const resetBtn = document.getElementById('reset-btn');
  const display = document.getElementById('bpm-display');
  const keyDisplay = document.getElementById('key-display');
  const camelotEl = document.getElementById('camelot');
  const ring = document.getElementById('pulse-ring');
  const flash = document.getElementById('flash');
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const chromaBox = document.getElementById('chroma');

  const el = {
    conf: document.getElementById('s-conf'),
    inst: document.getElementById('s-inst'),
    keyconf: document.getElementById('s-keyconf'),
    vol: document.getElementById('s-vol'),
    beats: document.getElementById('s-beats'),
  };

  // ---------- Note / Key data ----------
  const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

  // Camelot wheel mapping: [key name] -> camelot code
  const CAMELOT = {
    'C major':'8B','C# major':'3B','D major':'10B','D# major':'5B','E major':'12B','F major':'7B',
    'F# major':'2B','G major':'9B','G# major':'4B','A major':'11B','A# major':'6B','B major':'1B',
    'C minor':'5A','C# minor':'12A','D minor':'7A','D# minor':'2A','E minor':'9A','F minor':'4A',
    'F# minor':'11A','G minor':'6A','G# minor':'1A','A minor':'8A','A# minor':'3A','B minor':'10A'
  };

  // Krumhansl-Schmuckler key profiles
  const MAJOR_PROFILE = [6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
  const MINOR_PROFILE = [6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];

  // ---------- State ----------
  let audioCtx, analyser, stream, running = false;
  let freqData, timeData;

  // Beat detection
  let energyHistory = [];
  const HISTORY_SIZE = 43;
  let lastBeatTime = 0;
  const MIN_BEAT_INTERVAL = 250;
  let beatTimes = [];
  let beatCount = 0;
  let smoothedBpm = 0;

  // Key detection
  let chromaAccum = new Array(12).fill(0); // long-term accumulator
  let chromaFrame = new Array(12).fill(0); // for live display
  let chromaBars = [];
  let keyUpdateCounter = 0;

  // Build chroma bar UI
  NOTES.forEach(n => {
    const bar = document.createElement('div');
    bar.className = 'chroma-bar';
    bar.innerHTML = `<span>${n}</span>`;
    chromaBox.appendChild(bar);
    chromaBars.push(bar);
  });

  // ---------- Chromagram ----------
  function updateChroma() {
    // Reset live frame
    chromaFrame.fill(0);
    const nyquist = audioCtx.sampleRate / 2;
    const binHz = nyquist / freqData.length;

    // Map each freq bin to a pitch class (only musical range ~55Hz–4200Hz)
    for (let i = 1; i < freqData.length; i++) {
      const freq = i * binHz;
      if (freq < 55 || freq > 4200) continue;
      const mag = freqData[i] / 255;
      if (mag < 0.05) continue;
      // MIDI note number -> pitch class
      const midi = 69 + 12 * Math.log2(freq / 440);
      const pitchClass = ((Math.round(midi) % 12) + 12) % 12;
      chromaFrame[pitchClass] += mag * mag; // energy weighted
      chromaAccum[pitchClass] += mag * mag;
    }

    // Live chroma bar display (normalized)
    const maxF = Math.max(...chromaFrame, 0.0001);
    for (let i = 0; i < 12; i++) {
      chromaBars[i].style.height = (chromaFrame[i] / maxF * 60) + 'px';
    }
  }

  function detectKey() {
    // Normalize accumulated chroma
    const sum = chromaAccum.reduce((a, b) => a + b, 0);
    if (sum < 1) return; // not enough data yet
    const chroma = chromaAccum.map(v => v / sum);

    let best = { score: -Infinity, key: '', mode: '' };

    // Test all 24 keys (12 major + 12 minor)
    for (let root = 0; root < 12; root++) {
      const majScore = correlate(chroma, MAJOR_PROFILE, root);
      const minScore = correlate(chroma, MINOR_PROFILE, root);
      if (majScore > best.score) best = { score: majScore, key: NOTES[root], mode: 'major' };
      if (minScore > best.score) best = { score: minScore, key: NOTES[root], mode: 'minor' };
    }

    // Rough confidence from correlation strength
    const conf = Math.max(0, Math.min(100, Math.round(best.score * 100)));
    const fullKey = `${best.key} ${best.mode}`;
    keyDisplay.textContent = best.mode === 'minor' ? best.key + 'm' : best.key;
    camelotEl.textContent = CAMELOT[fullKey] || '--';
    el.keyconf.textContent = conf + '%';
  }

  // Pearson correlation between rotated profile and chroma
  function correlate(chroma, profile, root) {
    const rotated = [];
    for (let i = 0; i < 12; i++) rotated[i] = profile[(i - root + 12) % 12];

    const meanC = chroma.reduce((a, b) => a + b, 0) / 12;
    const meanP = rotated.reduce((a, b) => a + b, 0) / 12;
    let num = 0, denC = 0, denP = 0;
    for (let i = 0; i < 12; i++) {
      const dc = chroma[i] - meanC;
      const dp = rotated[i] - meanP;
      num += dc * dp; denC += dc * dc; denP += dp * dp;
    }
    return num / (Math.sqrt(denC * denP) + 1e-9);
  }

  // ---------- Beat / BPM ----------
  function detectBeat(now) {
    const bassEnd = Math.floor(freqData.length * 0.12);
    let energy = 0;
    for (let i = 0; i < bassEnd; i++) energy += freqData[i] * freqData[i];
    energy /= bassEnd;

    energyHistory.push(energy);
    if (energyHistory.length > HISTORY_SIZE) energyHistory.shift();

    const mean = energyHistory.reduce((a, b) => a + b, 0) / energyHistory.length;
    let variance = 0;
    for (const e of energyHistory) variance += (e - mean) ** 2;
    variance /= energyHistory.length;
    const threshold = mean * (1.35 + variance / (mean * mean + 1) * 0.15);

    if (energy > threshold && energy > 1200 && (now - lastBeatTime) > MIN_BEAT_INTERVAL) {
      lastBeatTime = now;
      beatCount++;
      beatTimes.push(now);
      if (beatTimes.length > 24) beatTimes.shift();
      onBeat();
      computeBpm();
    }
  }

  function computeBpm() {
    if (beatTimes.length < 4) return;
    const intervals = [];
    for (let i = 1; i < beatTimes.length; i++) intervals.push(beatTimes[i] - beatTimes[i - 1]);
    const sorted = [...intervals].sort((a, b) => a - b);
    const median = sorted[Math.floor(sorted.length / 2)];
    let bpm = 60000 / median;
    while (bpm < 70) bpm *= 2;
    while (bpm > 180) bpm /= 2;

    const meanInt = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    let dev = 0;
    for (const iv of intervals) dev += Math.abs(iv - meanInt);
    dev /= intervals.length;
    const confidence = Math.max(0, Math.min(100, 100 - (dev / meanInt) * 200));

    el.inst.textContent = Math.round(bpm);
    el.conf.textContent = Math.round(confidence) + '%';

    if (smoothedBpm === 0) smoothedBpm = bpm;
    const alpha = 0.15 + (confidence / 100) * 0.25;
    smoothedBpm += (bpm - smoothedBpm) * alpha;
    display.textContent = Math.round(smoothedBpm);
  }

  // ---------- Beat visual ----------
  function onBeat() {
    ring.classList.remove('ring-pulse');
    void ring.offsetWidth;
    ring.classList.add('ring-pulse');
    display.style.transform = 'scale(1.12)';
    display.style.textShadow = '0 0 55px var(--accent), 0 0 90px var(--accent)';
    setTimeout(() => {
      display.style.transform = 'scale(1)';
      display.style.textShadow = '0 0 30px var(--accent)';
    }, 90);
    flash.style.transition = 'none';
    flash.style.opacity = '1';
    requestAnimationFrame(() => { flash.style.transition = 'opacity 0.3s'; flash.style.opacity = '0'; });
  }

  // ---------- Main loop ----------
  function draw() {
    if (!running) return;
    requestAnimationFrame(draw);

    const now = performance.now();
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);

    detectBeat(now);
    updateChroma();

    // Update key every ~30 frames (~0.5s) — needs accumulated data
    keyUpdateCounter++;
    if (keyUpdateCounter >= 30) { keyUpdateCounter = 0; detectKey(); }

    // Stats
    let sum = 0;
    for (let i = 0; i < freqData.length; i++) sum += freqData[i];
    el.vol.textContent = Math.round(sum / freqData.length);
    el.beats.textContent = beatCount;

    // Visualizer bars
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    const barCount = 96;
    const step = Math.floor(freqData.length / barCount);
    const barW = w / barCount;
    for (let i = 0; i < barCount; i++) {
      const v = freqData[i * step] / 255;
      const barH = v * h;
      const hue = 140 + (i / barCount) * 60;
      ctx.fillStyle = `hsl(${hue}, 100%, ${40 + v * 30}%)`;
      ctx.fillRect(i * barW, h - barH, barW - 1, barH);
    }
    // Waveform
    ctx.beginPath();
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    for (let i = 0; i < timeData.length; i++) {
      const x = (i / timeData.length) * w;
      const y = (timeData[i] / 255) * h;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // ---------- Control ----------
  async function start() {
    try {
      statusEl.textContent = 'Requesting audio input...';
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
      });
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 4096;          // higher resolution -> better pitch/key accuracy
      analyser.smoothingTimeConstant = 0.5;
      source.connect(analyser);
      freqData = new Uint8Array(analyser.frequencyBinCount);
      timeData = new Uint8Array(analyser.fftSize);

      running = true;
      btn.style.display = 'none';
      resetBtn.style.display = 'inline-block';
      statusEl.textContent = '🎧 Listening... play your mix!';
      draw();
    } catch (err) {
      statusEl.textContent = '❌ Error: ' + err.message;
      console.error(err);
    }
  }

  function reset() {
    beatTimes = []; energyHistory = []; beatCount = 0; smoothedBpm = 0;
    chromaAccum.fill(0);
    display.textContent = '--'; keyDisplay.textContent = '--'; camelotEl.textContent = '--';
    el.inst.textContent = '--'; el.conf.textContent = '0%'; el.keyconf.textContent = '0%'; el.beats.textContent = '0';
    statusEl.textContent = 'Reset. Analysing fresh...';
  }

  btn.onclick = start;
  resetBtn.onclick = reset;
})();
</script>
</body>
</html>
