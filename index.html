<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro BPM Analyzer</title>
    <style>
        body { background: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #canvas { width: 90%; max-width: 800px; height: 200px; background: #000; border: 1px solid #333; border-radius: 8px; }
        #bpm-display { font-size: 5rem; font-weight: 800; color: #00ffcc; margin: 20px 0; text-shadow: 0 0 20px rgba(0,255,204,0.5); }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        select, button { padding: 12px 20px; border-radius: 5px; border: none; background: #333; color: #fff; cursor: pointer; }
        button { background: #00ffcc; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="bpm-display">-- BPM</div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <select id="audioSource"></select>
        <button id="startBtn">Start Analysis</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/realtime-bpm-analyzer/dist/index.min.js"></script>
    <script>
        const audioSource = document.getElementById('audioSource');
        const startBtn = document.getElementById('start-btn');
        const bpmDisplay = document.getElementById('bpm-display');
        let audioContext, stream;

        // Populate device list
        async function getDevices() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            devices.filter(d => d.kind === 'audioinput').forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.text = d.label || `Microphone ${audioSource.length + 1}`;
                audioSource.add(opt);
            });
        }
        navigator.mediaDevices.getUserMedia({ audio: true }).then(getDevices);

        document.getElementById('startBtn').addEventListener('click', async () => {
            audioContext = new AudioContext();
            stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { deviceId: { exact: audioSource.value } } 
            });
            
            const source = audioContext.createMediaStreamSource(stream);
            const analyzer = new RealTimeBPMAnalyzer({ continuousAnalysis: true });
            
            source.connect(analyzer);
            analyzer.on('bpm', (event) => {
                bpmDisplay.innerText = Math.round(event.bpm) + " BPM";
            });
        });
    </script>
</body>
</html>
