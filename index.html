<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live BPM Monitor</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #bpm-display { font-size: 8rem; font-weight: 900; color: #00ff88; margin: 20px 0; }
        #visualizer { width: 100%; height: 100px; background: #111; margin-bottom: 20px; }
        .pulse { animation: pulse 0.15s ease-out; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .btn { padding: 20px 40px; font-size: 20px; border-radius: 50px; border: none; background: #00ff88; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Vinyl BPM Monitor</h1>
    <div id="bpm-display">--</div>
    <canvas id="visualizer"></canvas>
    <button id="start-btn" class="btn">Start Monitoring</button>

    <script src="https://cdn.jsdelivr.net/npm/realtime-bpm-analyzer/dist/index.min.js"></script>
    <script>
        const btn = document.getElementById('start-btn');
        const display = document.getElementById('bpm-display');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        
        btn.onclick = async () => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);

            const bpmEngine = new RealTimeBpmAnalyzer();
            source.connect(bpmEngine.node);

            bpmEngine.on('bpm', (data) => {
                if (data.bpm.length > 0) {
                    const bpm = Math.round(data.bpm[0].tempo);
                    display.innerText = bpm;
                    display.classList.add('pulse');
                    setTimeout(() => display.classList.remove('pulse'), 100);
                }
            });

            btn.style.display = 'none';

            function draw() {
                requestAnimationFrame(draw);
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff88';
                for(let i = 0; i < data.length; i++) {
                    ctx.fillRect(i * 3, canvas.height - data[i]/2, 2, data[i]/2);
                }
            }
            draw();
        };
    </script>
</body>
</html>
