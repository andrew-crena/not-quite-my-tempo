<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f0f0f; color: #fff; font-family: system-ui; text-align: center; padding: 20px; }
        #canvas { width: 100%; max-width: 500px; height: 150px; background: #1a1a1a; border-radius: 8px; margin: 20px 0; }
        #bpm-display { font-size: 5rem; font-weight: bold; color: #00ff88; margin: 10px 0; }
        .btn { padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; background: #00ff88; color: #000; font-weight: bold; }
        .active-beat { animation: pulse 0.2s; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <h1>BPM Detector</h1>
    <div id="bpm-display">--</div>
    <div id="status">Ready</div>
    <canvas id="canvas"></canvas>
    <button id="start-btn" class="btn">Start Microphone</button>

    <script src="https://cdn.jsdelivr.net/npm/realtime-bpm-analyzer/dist/index.min.js"></script>
    <script>
        const btn = document.getElementById('start-btn');
        const display = document.getElementById('bpm-display');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let audioContext;
        let analyzer;

        btn.onclick = async () => {
            try {
                // 1. Setup AudioContext with cross-browser compatibility
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 2. Critical for iPhone: Resume the context manually
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                // 3. Request Mic
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                const analyserNode = audioContext.createAnalyser();
                
                source.connect(analyserNode);
                
                // 4. BPM Analysis
                const bpmEngine = new realtimeBpmAnalyzer.RealTimeBpmAnalyzer();
                source.connect(bpmEngine.node);

                bpmEngine.on('bpm', (data) => {
                    const tempo = Math.round(data.bpm[0].tempo);
                    display.innerText = tempo;
                    display.classList.add('active-beat');
                    setTimeout(() => display.classList.remove('active-beat'), 100);
                });

                status.innerText = "Analyzing live...";
                btn.style.display = 'none';

                // 5. Visualizer
                function draw() {
                    requestAnimationFrame(draw);
                    const array = new Uint8Array(analyserNode.frequencyBinCount);
                    analyserNode.getByteFrequencyData(array);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#00ff88';
                    for(let i = 0; i < 20; i++) {
                        ctx.fillRect(i * 25, canvas.height - array[i] / 2, 20, array[i] / 2);
                    }
                }
                draw();

            } catch (err) {
                status.innerText = "Error: " + err.message;
                alert("Please ensure you have given microphone permissions.");
            }
        };
    </script>
</body>
</html>
